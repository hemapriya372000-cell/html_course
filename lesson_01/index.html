<!-- tells browser that it is an HTML5 document -->
<!DOCTYPE html>
<!-- html tag -- root element that wraps all other elements in the document -->
 <!-- lang="en" tells the browser that the content is in English. specific tag also we can give -->
<html lang="en">
  <!-- head tag -- contains information about the document, such as its title and metadata - doesn't appear on the webpage -->
    <head>
      <!-- system for computers to store numbers,symbols,special chaacters -->
        <meta charset="UTF-8">
        <!-- ensures content is displayed correctly on different devices and screen sizes -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- page description for search engines -->
        <meta name="description" content="HTML Course - Lesson 01">
        <!-- keywords for search engines SEO -->
        <meta name="keywords" content="HTML, Course, Learning">
        <!-- favicon - website icon shown in browser tab -->
        <link rel="icon" type="image/x-icon" href="favicon.ico">
        <!-- external CSS stylesheet -->
        <link rel="stylesheet" href="styles.css">
        <title>Lesson 01</title>
    </head>
    <!-- body tag -- contains the content of the document that is displayed on the webpage -->
    <body>
      <!-- heading tag from h1 to h6, h1 is the largest and h6 is the smallest -->
       <!-- h1- used only once,  h1 to h6 with decresing importance  -->
        <h1>Heading 1</h1> 
        <h2>Heading 2</h2>
        <h3>Heading 3</h3>
        <h4>Heading 4</h4>
        <h5>Heading 5</h5>
        <h6>Heading 6</h6>
        <p>This is a paragraph.</p>
        <!-- list - ordered list and unordered list we can have ol inside ul and vice versa -->
        <o1>
          <li>list 1</li>
          <li>list 2</li>
          <li>list 3</li>
        </o1>
         <ul>
          <li>list 1</li>
          <li>list 2</li>
          <li>list 3</li>
        </ul>
        <!-- clickable text/image/element that takes you to another webpage or a different section of the same webpage when clicked. -->
        <a href="https://www.ggogle.com">Google</a>
        <a href="#gotoyoutube">Google</a>
        <h2 id="gotoyoutube">Go to Youtube</h2>
        <!-- image is a self closing tag, it doesn't have a closing tag like <p> or <h1> -->
        <img src="html5.png" alt="HTML5 Logo">
    </body>
</html>
